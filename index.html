<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduEthiopia | Student Registration System</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LOGIN PAGE (Initially Visible) -->
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-landmark"></i>
                <h2>EduEthiopia Admin</h2>
                <p>Login to Access Dashboard</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Admin Email</label>
                    <input type="email" id="loginEmail" placeholder="duladagn25@gmail.com" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Admin Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>
                <button type="submit"><i class="fas fa-sign-in-alt"></i> Login</button>
                <div id="loginError" class="error-msg" style="display: none;"></div>
            </form>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Hidden until login) -->
    <div id="dashboardContainer" style="display: none;">
        <div class="app-wrapper">
            <!-- SIDEBAR - Admin Navigation -->
            <aside class="sidebar">
                <div class="logo-area">
                    <i class="fas fa-landmark"></i>
                    <div>
                        <h2>EduEthiopia</h2>
                        <p>Admin Portal</p>
                    </div>
                </div>
                <nav class="nav-menu">
                    <div class="nav-item active" data-page="dashboard">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>Dashboard</span>
                    </div>
                    <div class="nav-item" data-page="register">
                        <i class="fas fa-user-plus"></i>
                        <span>Register Student</span>
                    </div>
                    <div class="nav-item" data-page="students">
                        <i class="fas fa-users"></i>
                        <span>Student List</span>
                    </div>
                    <div class="nav-item" data-page="upload">
                        <i class="fas fa-upload"></i>
                        <span>Upload Files</span>
                    </div>
                    <div class="nav-item" data-page="videos">
                        <i class="fas fa-video"></i>
                        <span>Video Gallery</span>
                    </div>
                    <div class="nav-item" data-page="admin">
                        <i class="fas fa-user-shield"></i>
                        <span>Admin Zone</span>
                    </div>
                    <div class="nav-item" data-page="about">
                        <i class="fas fa-info-circle"></i>
                        <span>About</span>
                    </div>
                    <div class="nav-item" data-page="contact">
                        <i class="fas fa-envelope"></i>
                        <span>Contact</span>
                    </div>
                </nav>
                <div class="sidebar-footer">
                    <button id="logoutBtn" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </aside>

            <!-- MAIN CONTENT PANEL -->
            <main class="main-panel">
                <div class="top-bar">
                    <h1 class="page-title" id="dynamicTitle">📊 Admin Dashboard</h1>
                    <div class="admin-badge">
                        <i class="fas fa-crown"></i> 
                        <span id="adminEmailDisplay">duladagn25@gmail.com</span>
                    </div>
                </div>
                <div id="pageContentContainer">
                    <!-- Dynamic content will be loaded here via JavaScript -->
                </div>
            </main>
        </div>
    </div>

    <!-- External JavaScript -->
    <script src="script.js"></script>
</body>
</html>
